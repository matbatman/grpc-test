syntax = "proto3"; // Используем третью версию синтаксиса Protocol Buffers

package hello; // Имя protobuf-пакета (логическое пространство имён)

// go_package определяет путь Go-пакета для сгенерированного кода.
// "gen/hello" — путь внутри проекта, куда protoc положит файлы.
// "hello" — имя Go-пакета.
option go_package = "gen/hello;hello";

// Определение gRPC-сервиса.
// HelloService — это интерфейс, который будет реализован на сервере.
service HelloService {
  // Метод SayHello принимает HelloRequest и возвращает HelloResponse.
  // Это обычный unary RPC: один запрос → один ответ.
  rpc SayHello (HelloRequest) returns (HelloResponse);
}

// Сообщение запроса.
// Клиент отправляет имя, которое сервер использует для формирования ответа.
message HelloRequest {
  string name = 1; // Поле №1: имя пользователя
}

// Сообщение ответа.
// Сервер возвращает строку message, например: "Hello, David!"
message HelloResponse {
  string message = 1; // Поле №1: текст ответа
}
